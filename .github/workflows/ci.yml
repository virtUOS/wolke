name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run coverage
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            pct=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
            echo "### Frontend coverage: ${pct}% lines" >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: web-ui/coverage
          retention-days: 7
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: spa-dist
          path: web-ui/dist
          retention-days: 1

  backend:
    name: Backend (lint, test+coverage, embedded build)
    runs-on: ubuntu-latest
    needs: frontend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: wolke
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: wolke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wolke -d wolke"
          --health-interval 5s --health-timeout 3s --health-retries 10
      mock-oidc:
        image: ghcr.io/navikt/mock-oauth2-server:2.1.10
        ports:
          - 8455:8080
        env:
          JSON_CONFIG: '{"interactiveLogin":false,"tokenCallbacks":[{"issuerId":"default","requestMappings":[{"requestParam":"client_id","match":"wolke","claims":{"sub":"stud-1","name":"Test Student","email":"stud@example.edu","eduPersonAffiliation":"student","groups":["dashboard-admins"]}}]}]}'
    env:
      DATABASE_URL: postgres://wolke:devpass@localhost:5432/wolke?sslmode=disable
      # IPv4: mock-oauth2-server crashes on IPv6 peers.
      OIDC_TEST_ISSUER: http://127.0.0.1:8455/default
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Download SPA build
        uses: actions/download-artifact@v8
        with:
          name: spa-dist
          path: dist-artifact
      - name: Lint
        run: go tool golangci-lint run ./...
      - name: Apply migrations
        run: go tool goose -dir migrations postgres "$DATABASE_URL" up
      - name: Seed dev catalog
        # The DB-backed integration tests assert against the dev seed (categories,
        # services, role defaults). Mirrors `make seed`; psql ships on the runner.
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f dev/seed.sql
      - name: Wait for mock OIDC
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$OIDC_TEST_ISSUER/.well-known/openid-configuration" >/dev/null; then
              echo "mock OIDC ready"; exit 0
            fi
            sleep 1
          done
          echo "mock OIDC did not become ready"; exit 1
      - name: Test (race + coverage, with real Postgres + mock OIDC)
        run: go test -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Coverage summary
        if: always()
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "### Backend coverage: ${total} statements" >> "$GITHUB_STEP_SUMMARY"
          go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            coverage.out
            coverage.html
          retention-days: 7
      - name: Build embedded binary
        run: |
          # Use the SPA built by the frontend job so the embed is the real app.
          rm -rf internal/web/dist/assets
          cp -r dist-artifact/* internal/web/dist/
          go build -o bin/server ./cmd/server

  image:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    # Only publish once both checks pass — the frontend AND backend jobs must be
    # green (the Dockerfile rebuilds the SPA + binary itself, so no artifact dep).
    needs: [frontend, backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        # Skip on pull_request: fork PRs don't get packages:write, and PR runs
        # only validate the build (push is disabled below).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          # Build on every run, but only publish on non-PR events. PR runs
          # (including Dependabot and forks) get a read-only GITHUB_TOKEN without
          # packages:write — and the GHCR login above is skipped — so a push 403s.
          # PRs therefore validate the build only; main/tags publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
