name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: web-ui/dist
          retention-days: 1

  backend:
    name: Backend (lint, test, embedded build)
    runs-on: ubuntu-latest
    needs: frontend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: servicehub
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: servicehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U servicehub -d servicehub"
          --health-interval 5s --health-timeout 3s --health-retries 10
      mock-oidc:
        image: ghcr.io/navikt/mock-oauth2-server:2.1.10
        ports:
          - 8455:8080
        env:
          JSON_CONFIG: '{"interactiveLogin":false,"tokenCallbacks":[{"issuerId":"default","requestMappings":[{"requestParam":"client_id","match":"service-hub","claims":{"sub":"stud-1","name":"Test Student","email":"stud@example.edu","eduPersonAffiliation":"student","groups":["dashboard-admins"]}}]}]}'
    env:
      DATABASE_URL: postgres://servicehub:devpass@localhost:5432/servicehub?sslmode=disable
      # IPv4: mock-oauth2-server crashes on IPv6 peers.
      OIDC_TEST_ISSUER: http://127.0.0.1:8455/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Download SPA build
        uses: actions/download-artifact@v4
        with:
          name: spa-dist
          path: dist-artifact
      - name: Lint
        run: go tool golangci-lint run ./...
      - name: Apply migrations
        run: go tool goose -dir migrations postgres "$DATABASE_URL" up
      - name: Wait for mock OIDC
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$OIDC_TEST_ISSUER/.well-known/openid-configuration" >/dev/null; then
              echo "mock OIDC ready"; exit 0
            fi
            sleep 1
          done
          echo "mock OIDC did not become ready"; exit 1
      - name: Test (race, with real Postgres + mock OIDC)
        run: go test -race ./...
      - name: Build embedded binary
        run: |
          # Use the SPA built by the frontend job so the embed is the real app.
          rm -rf internal/web/dist/assets
          cp -r dist-artifact/* internal/web/dist/
          go build -o bin/server ./cmd/server
