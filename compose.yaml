# End-to-end / staging stack: Caddy (TLS) → app → Postgres, with a one-shot
# migrate step and an optional mock OIDC IdP (docs/04 §4). This is NOT the daily
# loop — develop locally with `make run` + `make web-dev` (see README). Bring the
# IdP up with `--profile idp`.

services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: servicehub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: servicehub
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehub -d servicehub"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Forward-only migrations, run to completion before the app starts.
  migrate:
    build:
      context: .
      target: build
    command:
      - /out/goose
      - -dir
      - /src/migrations
      - postgres
      - postgres://servicehub:${POSTGRES_PASSWORD:-devpass}@postgres:5432/servicehub?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  app:
    build:
      context: .
    environment:
      # Public HTTPS URL (TLS terminates at Caddy). Drives Secure cookies and,
      # in Phase 1, OIDC redirect_uri — even though the app serves plain HTTP here.
      PUBLIC_URL: https://localhost
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://servicehub:${POSTGRES_PASSWORD:-devpass}@postgres:5432/servicehub?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET:-compose-dev-secret-change-me}
      # Trust X-Forwarded-* only from the Compose network (Caddy's subnet).
      TRUSTED_PROXIES: 172.28.0.0/16
      LOG_LEVEL: info
      # OIDC is wired in Phase 1; point it at the mock IdP then:
      # OIDC_ISSUER_URL: http://mock-oidc:8080/default
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    # Not published to the host: only Caddy reaches the app.
    expose:
      - "8080"

  caddy:
    image: docker.io/library/caddy:2
    # Prod defaults to the privileged ports (Caddy is the only exposed surface).
    # Rootless podman can't bind <1024: override e.g. CADDY_HTTPS_PORT=8443.
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - internal

  # Provider-agnostic dev IdP (proves the OIDC client is not Keycloak-specific).
  # Started only with `--profile idp`; wired up in Phase 1.
  mock-oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    profiles: ["idp"]
    environment:
      SERVER_PORT: "8080"
    expose:
      - "8080"
    networks:
      - internal

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    ipam:
      config:
        - subnet: 172.28.0.0/16
