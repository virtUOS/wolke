version: "2"
sql:
  - engine: postgresql
    # Schema is the goose migrations themselves; sqlc understands the
    # "-- +goose Up/Down" annotations and introspects only the applied (up) DDL.
    schema: migrations
    queries: internal/store/queries
    gen:
      go:
        package: store
        out: internal/store
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
