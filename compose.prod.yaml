# Production stack: Caddy (TLS) → app → Postgres. Unlike compose.yaml (the
# build-from-source staging stack), this PULLS the released app image from the
# registry — no source tree or build toolchain on the host:
#
#   export IMAGE_REPO=ghcr.io/<owner>/<repo>   # e.g. ghcr.io/virtuos/wolke
#   export WOLKE_VERSION=1.4.0                  # a released tag (or a digest)
#   docker compose -f compose.prod.yaml up -d
#
# The app applies forward-only migrations itself on startup (advisory-locked, so
# replicas don't race), so there's no separate migrate step.
#
# Everything fails closed: the image coordinates, DB password, session secret,
# public URL, and OIDC client settings must all be set (in a .env beside this
# file, or the environment) or `compose up` aborts. Hardening (no-new-privileges,
# cap_drop, read-only roots) and the edge/backend network split mirror compose.yaml.
#
# Before first deploy: put the real hostname in the Caddyfile (replace `localhost`)
# and provide config.yaml (OIDC claim→role mapping + branding) next to this file.

services:
  postgres:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: wolke
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: wolke
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wolke -d wolke"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ${IMAGE_REPO:?set IMAGE_REPO (e.g. ghcr.io/owner/repo)}:${WOLKE_VERSION:?set WOLKE_VERSION}
    environment:
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL (e.g. https://wolke.example.edu)}
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://wolke:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/wolke?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET (openssl rand -base64 32)}
      # Trust X-Forwarded-* only from the edge network (Caddy's subnet).
      TRUSTED_PROXIES: 172.28.0.0/16
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # OIDC (provider-agnostic): discovery URL + client credentials. Claim→role
      # mapping lives in config.yaml.
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:?set OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?set OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:?set OIDC_CLIENT_SECRET}
      CONFIG_FILE: /config.yaml
      # METRICS_TOKEN is optional — /metrics is already 404'd at the edge and the
      # app port is internal-only (see README → Metrics). Set it only if the
      # scrape path crosses an untrusted boundary.
    volumes:
      - ./config.yaml:/config.yaml:ro
      # Optional: override the image's baked-in default branding.
      # - ./branding:/branding:ro
    # The app auto-migrates on startup, so it only needs the database reachable.
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edge
      - backend
    expose:
      - "8080"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  caddy:
    image: docker.io/library/caddy:2
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - edge
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  edge:
    ipam:
      config:
        - subnet: 172.28.0.0/16
  backend:
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
